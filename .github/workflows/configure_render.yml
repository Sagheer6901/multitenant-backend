name: Configure and Deploy Render

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "main.py"
      - "static/**"
      - "requirements.txt"
      - "render.yaml"
      - "scripts/render_deploy.py"

jobs:
  deploy-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy hook (if configured)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -sf -X POST "$HOOK"
            echo "Render deploy hook triggered"
          else
            echo "RENDER_DEPLOY_HOOK not set, skipping hook"
          fi

      - name: Configure Render env and deploy via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PLATFORM_GITHUB_TOKEN }}
          GITHUB_OWNER: Sagheer6901
          GITHUB_MOBILE_REPO: multitenant-mobile
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "RENDER_API_KEY not set, skipping Render API deploy"
            exit 0
          fi
          python scripts/render_deploy.py
